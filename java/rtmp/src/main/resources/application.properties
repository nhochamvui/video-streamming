#Wed Jun 04 02:17:04 UTC 2025
micronaut.application.name=rtmp
micronaut.server.port=8888
micronaut.server.netty.compression-threshold=512
micronaut.server.netty.compression-level=6

micronaut.router.static-resources.hls.enabled=true
micronaut.router.static-resources.hls.mapping=/hls/**
micronaut.router.static-resources.hls.paths=file:./hls

micronaut.router.static-resources.static.enabled=true
micronaut.router.static-resources.static.mapping=/static/**
micronaut.router.static-resources.static.paths=classpath:static

rtmp.stream-key=

micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.web.allowed-origins=*
micronaut.server.cors.configurations.web.allowed-methods=GET,OPTIONS
