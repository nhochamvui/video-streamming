version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: rtmp-nginx
    ports:
      - "80:80"
    volumes:
      - ./hls:/app/hls:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rtmp-server
    user: root
    restart: unless-stopped

  rtmp-server:
    build: .
    container_name: rtmp-server
    ports:
      - "1935:1935"
    environment:
      RTMP_STREAM_KEY: "${RTMP_STREAM_KEY:-}"
    volumes:
      - ./hls:/app/hls
      - ./logs:/app/logs
    restart: unless-stopped
